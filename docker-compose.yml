services:
  ds2api:
    image: ghcr.io/cjackhwang/ds2api:latest
    container_name: ds2api
    restart: always
    env_file:
      - .env
    ports:
      - "${DS2API_HOST_PORT:-6011}:${PORT:-5001}"
    volumes:
      - ./config.json:/app/config.json    # 配置文件
      - ./.env:/app/.env                  # 环境变量
    environment:
      - TZ=Asia/Shanghai
      - LOG_LEVEL=INFO
      - DS2API_ADMIN_KEY=${DS2API_ADMIN_KEY:-ds2api}
